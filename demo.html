<script>
var COLS=80,ROWS=24;
var C={0:'#ccc',30:'#000',31:'#c44',32:'#4c4',33:'#cc4',34:'#48f',35:'#c4c',36:'#4cc',37:'#ccc',90:'#888',91:'#f66',92:'#6f6',93:'#ff6',94:'#6af',95:'#f6f',96:'#ff6',97:'#fff'};
var BG={40:'#000',41:'#c44',42:'#4c4',43:'#cc4',44:'#48f',45:'#c4c',46:'#4cc',47:'#ccc'};
var cells,fgA,bgA,curFg,curBg,row,col;

function reset(){
  cells=[];fgA=[];bgA=[];
  for(var r=0;r<ROWS;r++){cells[r]=[];fgA[r]=[];bgA[r]=[];for(var c=0;c<COLS;c++){cells[r][c]=' ';fgA[r][c]='#ccc';bgA[r][c]=null;}}
  curFg='#ccc';curBg=null;row=0;col=0;
}

function scroll(){
  cells.shift();fgA.shift();bgA.shift();
  var cr=[],cf=[],cb=[];
  for(var c=0;c<COLS;c++){cr[c]=' ';cf[c]='#ccc';cb[c]=null;}
  cells.push(cr);fgA.push(cf);bgA.push(cb);
  row=ROWS-1;
}

function putch(ch){
  if(row>=ROWS)scroll();
  if(col>=COLS){col=0;row++;if(row>=ROWS)scroll();}
  cells[row][col]=ch;fgA[row][col]=curFg;bgA[row][col]=curBg;col++;
}

function processAnsi(params,cmd){
  if(cmd==='H'||cmd==='f'){
    var p=params?params.split(';').map(Number):[1,1];
    row=Math.min((p[0]||1)-1,ROWS-1);col=Math.min((p[1]||1)-1,COLS-1);return;
  }
  if(cmd==='J'){
    var n=Number(params)||0;
    if(n===0||n===2){
      var sr=n===2?0:row,sc=n===2?0:col;
      for(var r=sr;r<ROWS;r++)for(var c=(r===sr?sc:0);c<COLS;c++){cells[r][c]=' ';fgA[r][c]='#ccc';bgA[r][c]=null;}
    }
    if(n===2){row=0;col=0;}return;
  }
  if(cmd==='K'){
    for(var c=col;c<COLS;c++){cells[row][c]=' ';fgA[row][c]='#ccc';bgA[row][c]=null;}return;
  }
  if(cmd==='m'){
    if(!params||params==='0'){curFg='#ccc';curBg=null;return;}
    var ps=params.split(';');
    for(var i=0;i<ps.length;i++){
      var v=Number(ps[i]);
      if(v===0){curFg='#ccc';curBg=null;}
      else if(v===1){/* bold — handled via bright colors */}
      else if(C[v])curFg=C[v];
      else if(BG[v])curBg=BG[v];
    }return;
  }
}

function feed(str){
  var i=0;
  while(i<str.length){
    var c=str.charCodeAt(i);
    if(c===27&&str.charAt(i+1)==='['){
      i+=2;var buf='';
      while(i<str.length&&str.charCodeAt(i)>=0x20&&str.charCodeAt(i)<=0x3f){buf+=str.charAt(i);i++;}
      if(i<str.length){processAnsi(buf,str.charAt(i));i++;}
      continue;
    }
    if(c===10){row++;col=0;if(row>=ROWS)scroll();i++;continue;}
    if(c===13){col=0;i++;continue;}
    if(c===27){i++;continue;}
    putch(str.charAt(i));i++;
  }
}

var grid=document.getElementById('grid');
function render(){
  var html='';
  for(var r=0;r<ROWS;r++){
    var seg='',sf='',sb='';
    for(var c=0;c<COLS;c++){
      var f=fgA[r][c],b=bgA[r][c]||'';
      if(f!==sf||b!==sb){
        if(seg.length)html+='<span style="color:'+sf+(sb?';background:'+sb:'')+'">'+seg+'</span>';
        seg='';sf=f;sb=b;
      }
      var ch=cells[r][c];
      seg+=ch==='<'?'&lt;':ch==='>'?'&gt;':ch==='&'?'&amp;':ch;
    }
    if(seg.length)html+='<span style="color:'+sf+(sb?';background:'+sb:'')+'">'+seg+'</span>';
    html+='\n';
  }
  grid.innerHTML=html;
}

var events=[];
var lines=document.getElementById('cast').textContent.trim().split('\n');
for(var i=1;i<lines.length;i++){
  var l=lines[i].trim();
  if(l)try{events.push(JSON.parse(l));}catch(e){}
}

function play(){
  reset();render();
  var idx=0;
  function step(){
    if(idx>=events.length)return;
    var ev=events[idx];
    feed(ev[2]);render();
    idx++;
    if(idx<events.length){
      var delay=(events[idx][0]-ev[0])*1000;
      setTimeout(step,Math.max(delay,5));
    }
  }
  setTimeout(step,events[0][0]*1000);
}

document.getElementById('replay').addEventListener('click',play);
play();
</script>
